<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scopri il tuo Segno e Ascendente</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#f4ecff,#ffffff);
min-height:100vh;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:25px;
background:#7b5cff;
color:white;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.result{
margin-top:25px;
padding:20px;
background:#f7f4ff;
border-radius:16px;
display:none;
}

.result h2{
margin-bottom:10px;
}

.footer{
margin-top:30px;
text-align:center;
font-size:14px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
🔮 Oroscopo x Acquario
</div>

<div class="subtitle">
Scopri il tuo segno zodiacale e il tuo ascendente
</div>

<label>Nome (facoltativo)</label>
<input type="text" id="nome" placeholder="Es. Luca">

<label>Data di nascita</label>
<input type="date" id="data">

<label>Ora di nascita</label>
<input type="time" id="ora">

<label>Città di nascita</label>
<input
type="text"
id="citta"
placeholder="Es. Roma"
list="listaCitta">

<datalist id="listaCitta">
<option value="Roma">
<option value="Milano">
<option value="Napoli">
<option value="Torino">
<option value="Palermo">
<option value="Genova">
<option value="Bologna">
<option value="Firenze">
<option value="Bari">
<option value="Velletri">
</datalist>

<button onclick="calcolaSegno()">
CALCOLA
</button>

<div class="result" id="result">

<h2 id="segno"></h2>

<p id="testo"></p>

</div>

<div class="footer">
@oroscopoxacquario
</div>

</div>

<script>

function calcolaSegno(){

const data=document.getElementById("data").value;

if(!data){
alert("Inserisci la data di nascita");
return;
}

const d=new Date(data);

const giorno=d.getDate();
const mese=d.getMonth()+1;

let segno="";

if((mese==1 && giorno>=20)||(mese==2 && giorno<=18))
segno="Acquario ♒";
else if((mese==2 && giorno>=19)||(mese==3 && giorno<=20))
segno="Pesci ♓";
else if((mese==3 && giorno>=21)||(mese==4 && giorno<=19))
segno="Ariete ♈";
else if((mese==4 && giorno>=20)||(mese==5 && giorno<=20))
segno="Toro ♉";
else if((mese==5 && giorno>=21)||(mese==6 && giorno<=20))
segno="Gemelli ♊";
else if((mese==6 && giorno>=21)||(mese==7 && giorno<=22))
segno="Cancro ♋";
else if((mese==7 && giorno>=23)||(mese==8 && giorno<=22))
segno="Leone ♌";
else if((mese==8 && giorno>=23)||(mese==9 && giorno<=22))
segno="Vergine ♍";
else if((mese==9 && giorno>=23)||(mese==10 && giorno<=22))
segno="Bilancia ♎";
else if((mese==10 && giorno>=23)||(mese==11 && giorno<=21))
segno="Scorpione ♏";
else if((mese==11 && giorno>=22)||(mese==12 && giorno<=21))
segno="Sagittario ♐";
else
segno="Capricorno ♑";

document.getElementById("segno").innerHTML =
"Il tuo segno è: " + segno;

document.getElementById("testo").innerHTML =
"Versione beta. Presto verrà calcolato automaticamente anche l'ascendente.";

document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
