<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calcolo Ascendente</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🔮 Calcola il tuo Ascendente</h1>

<p class="subtitle">
Inserisci i tuoi dati di nascita
</p>

<input
type="text"
id="nome"
placeholder="Nome (facoltativo)"
>

<input
type="date"
id="data"
>

<input
type="time"
id="ora"
>

<div class="city-wrapper">

<input
type="text"
id="citta"
placeholder="Comune di nascita"
autocomplete="off"
>

<div id="suggestions"></div>

</div>

<button id="calcolaBtn">

✨ CALCOLA

</button>

<div id="result"></div>

</div>

<script src="js/sweph.js"></script>
<script src="script.js"></script>

</body>
</html>
