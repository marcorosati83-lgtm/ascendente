<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oroscopo x Acquario - Calcola Ascendente</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

button{
    background:#6a5cff;
    color:white;
    border:none;
    cursor:pointer;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f0f0ff;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔮 Oroscopo x Acquario</h1>

<p>Scopri il tuo segno zodiacale</p>

<input type="date" id="birthDate">

<button onclick="calcolaSegno()">Calcola</button>

<div class="result" id="risultato"></div>

</div>

<script>

function calcolaSegno(){

let data = document.getElementById("birthDate").value;

if(!data){
    alert("Inserisci la data");
    return;
}

let d = new Date(data);

let giorno = d.getDate();
let mese = d.getMonth()+1;

let segno="";

if((mese==1 && giorno>=20)||(mese==2 && giorno<=18)) segno="Acquario ♒";
else if((mese==2 && giorno>=19)||(mese==3 && giorno<=20)) segno="Pesci ♓";
else if((mese==3 && giorno>=21)||(mese==4 && giorno<=19)) segno="Ariete ♈";
else if((mese==4 && giorno>=20)||(mese==5 && giorno<=20)) segno="Toro ♉";
else if((mese==5 && giorno>=21)||(mese==6 && giorno<=20)) segno="Gemelli ♊";
else if((mese==6 && giorno>=21)||(mese==7 && giorno<=22)) segno="Cancro ♋";
else if((mese==7 && giorno>=23)||(mese==8 && giorno<=22)) segno="Leone ♌";
else if((mese==8 && giorno>=23)||(mese==9 && giorno<=22)) segno="Vergine ♍";
else if((mese==9 && giorno>=23)||(mese==10 && giorno<=22)) segno="Bilancia ♎";
else if((mese==10 && giorno>=23)||(mese==11 && giorno<=21)) segno="Scorpione ♏";
else if((mese==11 && giorno>=22)||(mese==12 && giorno<=21)) segno="Sagittario ♐";
else segno="Capricorno ♑";

document.getElementById("risultato").innerHTML=
"<h2>"+segno+"</h2>";

}

</script>

</body>
</html>
